<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calculator</title>
   <link rel="stylesheet" href="02-calculator.css">
</head>
<body>
    <div class="section">
   <h2> Simple Calculator  🧮</h2> 
   <div id="continor">
    <div id="input">
        <input type="text" id="display" readonly>
    </div>
    <div id="button">
      
        <button class="number">9</button>
        <button class="number">8</button>
        <button class="number">7</button>
        <button class="opp">*</button>
        <button class="number">6</button>
        <button class="number">5</button>
        <button class="number">4</button>
        <button class="opp">/</button>
        <button class="number">3</button>
        <button class="number">2</button>
        <button class="number">1</button>
        <button class="opp">+</button>
        <button class="number">0</button>
        <button class="sintific" data-value="log10">log<sub>10</sub></button>
        <button class="sintific" data-value="abs">|x|</button>
        <button class="opp">-</button>
         <button id="equal">=</button>
        <button class="sintific" data-value="sqrt">&radic;</button>
        <button class="sintific" data-value="^">x<sup>2</sup></button>
        <button class="sintific" data-value="power">x<sup>y</sup></button>
        <button class="sintific" data-value="sin">sin</button>
        <button class="sintific" data-value="cos">cos</button>
        <button class="sintific" data-value="tan">tan</button>
        <button class="sintific" data-value="log">log</button>
        <button class="sintific" data-value="log2">log<sub>2</sub></button>
        <button class="sintific" data-value="floor">⌊x⌋</button>
        <button id="del" >C</button>
        <button id="clear">AC</button>
    </div>
    </div>
   </div>
   <div id="name"></div>
   <script src="03-calculator.js"></script>
</body>
</html>
